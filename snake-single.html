<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 24px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: #4ecca3;
      text-shadow: 0 0 20px rgba(78,204,163,0.5);
    }

    /* 分数板 */
    .score-board {
      display: flex;
      gap: 32px;
    }

    .score-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.05);
      padding: 10px 24px;
      border-radius: 12px;
      border: 1px solid rgba(78,204,163,0.2);
      min-width: 80px;
    }

    .score-item .label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: #888;
      text-transform: uppercase;
    }

    .score-item span:last-child {
      font-size: 1.6rem;
      font-weight: 700;
      color: #4ecca3;
    }

    /* 画布区域 */
    .game-wrapper {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(78,204,163,0.2), 0 0 0 2px rgba(78,204,163,0.3);
    }

    #gameCanvas {
      display: block;
      background: #0f0f23;
    }

    /* 遮罩层 */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(15,15,35,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .overlay.hidden { display: none; }

    .overlay-content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #overlay-title {
      font-size: 2rem;
      color: #4ecca3;
      text-shadow: 0 0 16px rgba(78,204,163,0.6);
    }

    #overlay-message { color: #aaa; font-size: 0.95rem; }

    #start-btn {
      margin-top: 8px;
      padding: 12px 36px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 2px;
      color: #1a1a2e;
      background: #4ecca3;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 0 20px rgba(78,204,163,0.4);
    }

    #start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 32px rgba(78,204,163,0.7);
    }

    #start-btn:active { transform: scale(0.97); }

    /* 操作提示 */
    .controls-hint {
      display: flex;
      gap: 24px;
      font-size: 0.78rem;
      color: #555;
      letter-spacing: 1px;
    }

    /* 手机按钮 */
    .mobile-controls {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
    }

    .mobile-row { display: flex; gap: 6px; }

    .mobile-btn {
      width: 56px;
      height: 56px;
      font-size: 1.2rem;
      background: rgba(78,204,163,0.15);
      color: #4ecca3;
      border: 1px solid rgba(78,204,163,0.35);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
      -webkit-user-select: none;
    }

    .mobile-btn:active { background: rgba(78,204,163,0.4); }

    @media (max-width: 500px) {
      #gameCanvas { width: 320px; height: 320px; }
      .mobile-controls { display: flex; }
      .controls-hint { display: none; }
      .score-board { gap: 12px; }
      .score-item { padding: 8px 16px; min-width: 64px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>贪吃蛇</h1>

    <div class="score-board">
      <div class="score-item">
        <span class="label">得分</span>
        <span id="score">0</span>
      </div>
      <div class="score-item">
        <span class="label">最高分</span>
        <span id="best-score">0</span>
      </div>
      <div class="score-item">
        <span class="label">等级</span>
        <span id="level">1</span>
      </div>
    </div>

    <div class="game-wrapper">
      <canvas id="gameCanvas" width="400" height="400"></canvas>
      <div id="overlay" class="overlay">
        <div class="overlay-content">
          <h2 id="overlay-title">贪吃蛇</h2>
          <p id="overlay-message">用方向键或 WASD 控制方向</p>
          <button id="start-btn">开始游戏</button>
        </div>
      </div>
    </div>

    <div class="controls-hint">
      <span>↑ ↓ ← → 或 W A S D 控制方向</span>
      <span>P 暂停 / 继续</span>
    </div>

    <div class="mobile-controls">
      <div class="mobile-row">
        <button class="mobile-btn" id="btn-up">▲</button>
      </div>
      <div class="mobile-row">
        <button class="mobile-btn" id="btn-left">◀</button>
        <button class="mobile-btn" id="btn-down">▼</button>
        <button class="mobile-btn" id="btn-right">▶</button>
      </div>
    </div>
  </div>

  <script>
    const canvas   = document.getElementById('gameCanvas');
    const ctx      = canvas.getContext('2d');
    const overlay  = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const overlayTitle   = document.getElementById('overlay-title');
    const overlayMessage = document.getElementById('overlay-message');
    const scoreEl    = document.getElementById('score');
    const bestScoreEl = document.getElementById('best-score');
    const levelEl    = document.getElementById('level');

    const COLS = 20, ROWS = 20;
    const CELL = canvas.width / COLS;

    const DIR_MAP = {
      ArrowUp:    { x:0, y:-1 }, ArrowDown:  { x:0, y:1 },
      ArrowLeft:  { x:-1,y:0 }, ArrowRight: { x:1, y:0 },
      w: { x:0, y:-1 }, s: { x:0, y:1 },
      a: { x:-1,y:0 }, d: { x:1, y:0 },
    };

    let snake, dir, nextDir, food, score, level, bestScore, gameLoop, paused, running;

    /* ── 初始化 ── */
    function init() {
      snake   = [{ x:10,y:10 }, { x:9,y:10 }, { x:8,y:10 }];
      dir     = { x:1, y:0 };
      nextDir = { x:1, y:0 };
      score   = 0;
      level   = 1;
      paused  = false;
      running = true;
      bestScore = parseInt(localStorage.getItem('snakeBest') || '0');
      updateHUD();
      spawnFood();
    }

    function spawnFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
      } while (snake.some(s => s.x===pos.x && s.y===pos.y));
      food = pos;
    }

    function getSpeed() { return Math.max(80, 200 - (level-1)*20); }

    /* ── 游戏启动 ── */
    function startGame() {
      overlay.classList.add('hidden');
      init();
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, getSpeed());
    }

    /* ── 游戏主循环 ── */
    function tick() {
      if (paused || !running) return;
      dir = { ...nextDir };
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // 撞墙
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return endGame();
      // 撞自己
      if (snake.some(s => s.x===head.x && s.y===head.y)) return endGame();

      snake.unshift(head);

      if (head.x===food.x && head.y===food.y) {
        score += level * 10;
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('snakeBest', bestScore);
        }
        const newLevel = Math.floor(score / 100) + 1;
        if (newLevel !== level) {
          level = newLevel;
          clearInterval(gameLoop);
          gameLoop = setInterval(tick, getSpeed());
        }
        updateHUD();
        spawnFood();
      } else {
        snake.pop();
      }
      draw();
    }

    /* ── 游戏结束 ── */
    function endGame() {
      running = false;
      clearInterval(gameLoop);
      overlayTitle.textContent   = '游戏结束';
      overlayMessage.textContent = `得分：${score}　最高分：${bestScore}`;
      startBtn.textContent = '再来一局';
      overlay.classList.remove('hidden');
    }

    /* ── 暂停 ── */
    function togglePause() {
      if (!running) return;
      paused = !paused;
      if (paused) {
        overlayTitle.textContent   = '已暂停';
        overlayMessage.textContent = '按 P 继续游戏';
        startBtn.textContent = '继续';
        overlay.classList.remove('hidden');
      } else {
        overlay.classList.add('hidden');
      }
    }

    function updateHUD() {
      scoreEl.textContent    = score;
      bestScoreEl.textContent = bestScore;
      levelEl.textContent    = level;
    }

    /* ── 绘制 ── */
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawFood();
      drawSnake();
    }

    function drawGrid() {
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, canvas.height); ctx.stroke();
      }
      for (let i = 0; i <= ROWS; i++) {
        ctx.beginPath(); ctx.moveTo(0, i*CELL); ctx.lineTo(canvas.width, i*CELL); ctx.stroke();
      }
    }

    function drawFood() {
      const cx = food.x*CELL + CELL/2;
      const cy = food.y*CELL + CELL/2;
      const r  = CELL/2 - 3;

      // 发光
      const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r+4);
      grd.addColorStop(0, 'rgba(255,80,80,0.6)');
      grd.addColorStop(1, 'rgba(255,80,80,0)');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(cx, cy, r+4, 0, Math.PI*2); ctx.fill();

      // 苹果主体
      ctx.fillStyle = '#ff5050';
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();

      // 高光
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath(); ctx.arc(cx - r*0.25, cy - r*0.25, r*0.3, 0, Math.PI*2); ctx.fill();
    }

    function drawSnake() {
      snake.forEach((seg, i) => {
        const x = seg.x*CELL + 1, y = seg.y*CELL + 1, s = CELL - 2;

        if (i === 0) {
          ctx.fillStyle = '#4ecca3';
        } else {
          const t = i / snake.length;
          ctx.fillStyle = `rgb(${Math.round(lerp(78,30,t))},${Math.round(lerp(204,140,t))},${Math.round(lerp(163,100,t))})`;
        }

        roundRect(x, y, s, s, i===0 ? 6 : 4);
        ctx.fill();
        if (i === 0) drawEyes(seg);
      });
    }

    function drawEyes(head) {
      const cx = head.x*CELL + CELL/2, cy = head.y*CELL + CELL/2;
      const offset = 4;
      let e1, e2;
      if      (dir.x === 1)  { e1={x:cx+4,y:cy-offset}; e2={x:cx+4,y:cy+offset}; }
      else if (dir.x === -1) { e1={x:cx-4,y:cy-offset}; e2={x:cx-4,y:cy+offset}; }
      else if (dir.y === -1) { e1={x:cx-offset,y:cy-4}; e2={x:cx+offset,y:cy-4}; }
      else                   { e1={x:cx-offset,y:cy+4}; e2={x:cx+offset,y:cy+4}; }

      ctx.fillStyle = '#1a1a2e';
      [e1, e2].forEach(e => { ctx.beginPath(); ctx.arc(e.x, e.y, 2.5, 0, Math.PI*2); ctx.fill(); });
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x+r, y);
      ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y,   x+w, y+r);
      ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
      ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x,   y+h, x,   y+h-r);
      ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x,   y,   x+r, y);
      ctx.closePath();
    }

    function lerp(a, b, t) { return a + (b-a)*t; }

    /* ── 键盘输入 ── */
    document.addEventListener('keydown', e => {
      if (e.key === 'p' || e.key === 'P') { if (running) togglePause(); return; }
      const d = DIR_MAP[e.key];
      if (!d) return;
      e.preventDefault();
      if (d.x === -dir.x && d.y === -dir.y) return;
      nextDir = d;
    });

    /* ── 按钮事件 ── */
    startBtn.addEventListener('click', () => {
      if (paused) togglePause(); else startGame();
    });

    document.getElementById('btn-up').addEventListener('click',    () => setDir({x:0,y:-1}));
    document.getElementById('btn-down').addEventListener('click',  () => setDir({x:0,y:1}));
    document.getElementById('btn-left').addEventListener('click',  () => setDir({x:-1,y:0}));
    document.getElementById('btn-right').addEventListener('click', () => setDir({x:1,y:0}));

    function setDir(d) {
      if (d.x === -dir.x && d.y === -dir.y) return;
      nextDir = d;
    }

    /* ── 触摸滑动 ── */
    let touchStart = null;
    canvas.addEventListener('touchstart', e => {
      touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }, { passive: true });
    canvas.addEventListener('touchend', e => {
      if (!touchStart) return;
      const dx = e.changedTouches[0].clientX - touchStart.x;
      const dy = e.changedTouches[0].clientY - touchStart.y;
      if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
      setDir(Math.abs(dx) > Math.abs(dy)
        ? (dx > 0 ? {x:1,y:0} : {x:-1,y:0})
        : (dy > 0 ? {x:0,y:1} : {x:0,y:-1}));
      touchStart = null;
    }, { passive: true });
  </script>
</body>
</html>
